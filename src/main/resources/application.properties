# Application
spring.application.name=automated-traffic-system
spring.profiles.default=dev
spring.autoconfigure.exclude=org.springframework.ai.autoconfigure.openai.OpenAiAutoConfiguration

# Data and persistence
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# AI
spring.ai.openai.api-key=${OPENAI_API_KEY:}
spring.ai.openai.chat.options.model=gpt-4.1-mini
spring.ai.openai.chat.options.temperature=0.4

# HTTP server lifecycle
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=20s

# Observability
management.endpoints.web.exposure.include=health,info,prometheus,metrics,loggers
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=when_authorized
management.metrics.tags.application=${spring.application.name}

# Logging
logging.level.org.springframework=INFO
logging.level.com.example.automatedtrafficsystem=INFO
logging.pattern.level=%5p [requestId:%X{requestId:-na}]
